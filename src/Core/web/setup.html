<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.ico">
<title>CouchDesk | Setup</title>
<style>
  :root { --bg:#FBFAF8; --card:#FFFFFF; --field:#F4F1EC; --line:#E7E2DC; --txt:#1A1512;
    --muted:#7C7269; --accent:#FF7A1A; --accent-hover:#F06A00; --accent-ink:#2A1508;
    --soft:#F1EDE8; --label:#4A413A; --foot:#A79E94; --err:#C4381F; --ok:#1E8A5B;
    --card-shadow:0 20px 50px rgba(120,80,30,.12); }
  :root[data-theme="dark"] { --bg:#0C0C0D; --card:#18171A; --field:#232227; --line:#3A383E; --txt:#FFFAF5;
    --muted:#A9A29C; --accent:#FF7A1A; --accent-hover:#FF8F3D; --accent-ink:#211006;
    --soft:#111317; --label:#C7CBD1; --foot:#777E87; --err:#F87171; --ok:#34D399;
    --card-shadow:0 18px 50px rgba(0,0,0,.32); }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:32px; box-shadow:var(--card-shadow); }
  .brand { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .brand img { width:30px; height:30px; border-radius:8px; }
  .brand strong { font-size:15px; font-weight:600; letter-spacing:.01em; }
  h1 { font-size:24px; line-height:1.25; font-weight:600; letter-spacing:-.02em; margin:0 0 8px; }
  p.sub { color:var(--muted); font-size:13px; line-height:1.55; margin:0 0 20px; }
  label { display:block; font-size:12px; font-weight:600; color:var(--label); margin:14px 0 7px; }
  input { width:100%; font-size:15px; padding:12px 13px; border-radius:9px; background:var(--field);
    color:var(--txt); border:1px solid var(--line); outline:none; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,122,26,.14); }
  button { width:100%; font-size:14px; font-weight:600; padding:12px; margin-top:18px; border-radius:9px;
    background:var(--accent); color:var(--accent-ink); border:none; cursor:pointer; }
  button:hover { background:var(--accent-hover); }
  button:active { transform:translateY(1px); }
  #msg { margin-top:12px; min-height:18px; font-size:13px; color:var(--muted); }
  #msg.err { color:var(--err); }
  #msg.ok { color:var(--ok); }
  .hint { font-size:11px; color:var(--foot); margin-top:16px; text-align:center; }
  .theme-toggle { position:fixed; top:14px; right:14px; width:38px; height:38px; margin:0; padding:0;
    display:flex; align-items:center; justify-content:center; font-size:16px; border-radius:10px;
    background:var(--card); color:var(--muted); border:1px solid var(--line); box-shadow:var(--card-shadow); cursor:pointer; }
  .theme-toggle:hover { background:var(--soft); }
  @media (max-width:460px) { .card { padding:26px 22px; } }
</style>
<script>(function(){try{var t=localStorage.getItem('cd-theme')||'light';if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
</head>
<body>
  <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark"><span id="themeIcon">☾</span></button>
  <div class="card">
    <div class="brand"><img src="favicon.ico" alt=""><strong>CouchDesk</strong></div>
    <h1 id="title">Secure this PC</h1>
    <p class="sub">Choose a strong password with at least 12 characters. CouchDesk stores only an Argon2id hash, never the plaintext password.</p>
    <label for="hostName">This PC name</label>
    <input id="hostName" type="text" placeholder="Mattias PC" autocomplete="off" maxlength="64">
    <label for="p">Admin password</label>
    <input id="p" type="password" placeholder="At least 12 characters" autocomplete="new-password">
    <label for="p2">Confirm password</label>
    <input id="p2" type="password" placeholder="Re-enter password" autocomplete="new-password"
           onkeydown="if(event.key==='Enter') go()">
    <button onclick="go()">Create password</button>
    <div id="msg"></div>
    <p class="hint">After this, log in from this or another device on the same network.</p>
  </div>

<script>
function toggleTheme(){
  const d=document.documentElement;
  const dark=d.getAttribute('data-theme')==='dark';
  if(dark){d.removeAttribute('data-theme');} else {d.setAttribute('data-theme','dark');}
  try{localStorage.setItem('cd-theme',dark?'light':'dark');}catch(e){}
  updateThemeIcon();
}
function updateThemeIcon(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const el=document.getElementById('themeIcon');
  if(el) el.textContent=dark?'☀':'☾';
}
updateThemeIcon();
loadHostName();

async function loadHostName() {
  try {
    const r = await fetch('/api/about', { cache: 'no-store' });
    if (!r.ok) return;
    const about = await r.json();
    const name = String(about.hostDisplayName || '').trim();
    if (!name) return;
    document.getElementById('title').textContent = 'Secure ' + name;
    document.getElementById('hostName').value = name;
  } catch (e) {}
}

async function go() {
  const msg = document.getElementById('msg');
  const p = document.getElementById('p').value;
  const p2 = document.getElementById('p2').value;
  const hostDisplayName = document.getElementById('hostName').value.trim();
  msg.className = '';

  if (p.length < 12) { msg.textContent = 'Password must be at least 12 characters.'; msg.className = 'err'; return; }
  if (p !== p2) { msg.textContent = 'Passwords do not match.'; msg.className = 'err'; return; }

  try {
    const r = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: p, hostDisplayName })
    });
    if (r.ok) {
      msg.textContent = 'Done. Redirecting to login…';
      msg.className = 'ok';
      setTimeout(() => location.href = '/login.html', 800);
    } else {
      msg.textContent = 'Error: ' + (await r.text());
      msg.className = 'err';
    }
  } catch (e) {
    msg.textContent = 'Network error: ' + e.message;
    msg.className = 'err';
  }
}
</script>
</body>
</html>
