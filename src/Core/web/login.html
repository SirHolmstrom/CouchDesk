<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.ico">
<title>CouchDesk | Sign in</title>
<style>
  :root { --bg:#FBFAF8; --card:#FFFFFF; --field:#F4F1EC; --line:#E7E2DC; --txt:#1A1512;
    --muted:#7C7269; --accent:#FF7A1A; --accent-hover:#F06A00; --accent-ink:#2A1508;
    --soft:#F1EDE8; --active:#FFFFFF; --label:#4A413A; --foot:#A79E94; --err:#C4381F;
    --card-shadow:0 20px 50px rgba(120,80,30,.12); }
  :root[data-theme="dark"] { --bg:#0C0C0D; --card:#18171A; --field:#232227; --line:#3A383E; --txt:#FFFAF5;
    --muted:#A9A29C; --accent:#FF7A1A; --accent-hover:#FF8F3D; --accent-ink:#211006;
    --soft:#111317; --active:#292C31; --label:#C7CBD1; --foot:#777E87; --err:#F87171;
    --card-shadow:0 18px 50px rgba(0,0,0,.32); }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:32px; box-shadow:var(--card-shadow); }
  .brand { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .brand img { width:30px; height:30px; border-radius:8px; }
  .brand strong { font-size:15px; font-weight:600; letter-spacing:.01em; }
  h1 { font-size:24px; line-height:1.25; font-weight:600; letter-spacing:-.02em; margin:0 0 8px; }
  p.sub { color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 22px; }
  .mode { display:grid; grid-template-columns:1fr 1fr; gap:3px; padding:3px; margin-bottom:22px;
    border:1px solid var(--line); border-radius:10px; background:var(--soft); }
  .mode button { margin:0; padding:9px; border-radius:7px; background:transparent; color:var(--muted); font-weight:600; box-shadow:none; }
  .mode button.active { background:var(--active); color:var(--txt); box-shadow:inset 0 -2px 0 var(--accent); }
  label { display:block; font-size:12px; font-weight:600; color:var(--label); margin-bottom:7px; }
  .theme-toggle { position:fixed; top:14px; right:14px; width:38px; height:38px; margin:0; padding:0;
    display:flex; align-items:center; justify-content:center; font-size:16px; border-radius:10px;
    background:var(--card); color:var(--muted); border:1px solid var(--line); box-shadow:var(--card-shadow); cursor:pointer; }
  .theme-toggle:hover { background:var(--soft); }
  input { width:100%; font-size:15px; padding:12px 13px; border-radius:9px; background:var(--field);
    color:var(--txt); border:1px solid var(--line); outline:none; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,122,26,.14); }
  button { width:100%; font-size:14px; font-weight:600; padding:12px; margin-top:16px; border-radius:9px;
    background:var(--accent); color:var(--accent-ink); border:none; cursor:pointer; }
  button:hover { background:var(--accent-hover); }
  button:active { transform:translateY(1px); }
  #msg { margin-top:12px; min-height:18px; font-size:13px; color:var(--muted); }
  #msg.err { color:var(--err); }
  .foot { margin-top:18px; font-size:11px; color:var(--foot); text-align:center; }
  @media (max-width:440px) { .card { padding:26px 22px; } }
</style>
<script>(function(){try{var t=localStorage.getItem('cd-theme')||'light';if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
</head>
<body>
  <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark"><span id="themeIcon">☾</span></button>
  <div class="card">
    <div class="brand"><img src="favicon.ico" alt=""><strong>CouchDesk</strong></div>
    <h1 id="title">Connect to this PC</h1>
    <p id="sub" class="sub">Use the admin/owner password.</p>
    <div class="mode" role="group" aria-label="Access type">
      <button id="loginMode" class="active" type="button" onclick="setMode('login')">Login</button>
      <button id="guestMode" type="button" onclick="setMode('guest')">Guest</button>
    </div>
    <label id="credentialLabel" for="credential">Password</label>
    <input id="credential" type="password" placeholder="Password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') submitLogin()">
    <button id="submitButton" onclick="submitLogin()">Sign in</button>
    <div id="msg"></div>
    <div class="foot">Direct connection. TLS encrypted.</div>
  </div>

<script>
function toggleTheme(){
  const d=document.documentElement;
  const dark=d.getAttribute('data-theme')==='dark';
  if(dark){d.removeAttribute('data-theme');} else {d.setAttribute('data-theme','dark');}
  try{localStorage.setItem('cd-theme',dark?'light':'dark');}catch(e){}
  updateThemeIcon();
}
function updateThemeIcon(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const el=document.getElementById('themeIcon');
  if(el) el.textContent=dark?'☀':'☾';
}
updateThemeIcon();
loadHostName();

async function loadHostName() {
  try {
    const r = await fetch('/api/about', { cache: 'no-store' });
    if (!r.ok) return;
    const about = await r.json();
    const name = String(about.hostDisplayName || '').trim();
    if (name) document.getElementById('title').textContent = 'Connect to ' + name;
  } catch (e) {}
}

let mode = 'login';

function setMode(nextMode) {
  mode = nextMode;
  const guest = mode === 'guest';
  document.getElementById('loginMode').classList.toggle('active', !guest);
  document.getElementById('guestMode').classList.toggle('active', guest);
  document.getElementById('sub').textContent = guest
    ? 'Enter the temporary code shared by the PC owner.'
    : 'Use the permanent owner password.';
  const label = document.getElementById('credentialLabel');
  const input = document.getElementById('credential');
  label.textContent = guest ? 'Invite code' : 'Password';
  input.type = guest ? 'text' : 'password';
  input.placeholder = guest ? 'XXXX-XXXX' : 'Password';
  input.autocomplete = guest ? 'one-time-code' : 'current-password';
  input.value = '';
  document.getElementById('submitButton').textContent = guest ? 'Connect' : 'Sign in';
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = '';
  input.focus();
}

async function submitLogin() {
  const msg = document.getElementById('msg');
  const credential = document.getElementById('credential').value;
  msg.className = '';
  msg.textContent = 'Signing in…';
  try {
    const guest = mode === 'guest';
    const r = await fetch(guest ? '/api/guest-login' : '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(guest ? { code: credential } : { password: credential })
    });
    if (r.ok) {
      location.href = '/index.html';
    } else if (r.status === 429) {
      msg.textContent = 'Too many attempts. Try again in ' + r.headers.get('Retry-After') + 's.';
      msg.className = 'err';
    } else {
      msg.textContent = guest ? 'Invalid or expired invite code.' : 'Invalid password.';
      msg.className = 'err';
    }
  } catch (e) {
    msg.textContent = 'Network error: ' + e.message;
    msg.className = 'err';
  }
}
</script>
</body>
</html>
